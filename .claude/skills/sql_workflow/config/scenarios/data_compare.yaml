scenario:
  name: data_compare
  description: Compare source partition with temp partition of the same table
  keywords:
    - 对账工作流
    - 对账流程
    - 对账
    - reconcile
    - data compare
    - compare
    - diff

required_params:
  - table_name
  - partition
  - join_keys

defaults:
  temp_suffix: -temp

steps:
  - name: copy_source_partition_to_temp
    template: move_partition

  - name: count_source_partition
    template: data_num
    partition_role: source

  - name: count_temp_partition
    template: data_num
    partition_role: target

  - name: diff_source_vs_temp
    template: data_diff
