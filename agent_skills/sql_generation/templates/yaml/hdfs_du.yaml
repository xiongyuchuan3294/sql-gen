type: "hdfs_du"
description: "Check HDFS path size for multiple targets"
params:
  targets:
    # Recommended: explicit db + table
    - db: "imd_aml_safe"
      table: "table_name"
    # Optional: table-only. Generator will discover matching db(s) from current Hive env.
    # If discovery fails, it will render path without db segment.
    - table: "t_sql_hdfs_smoke"
    # Optional: db list + table (batch expansion)
    - dbs: ["imd_dm_safe", "imd_rdfs_dm_safe"]
      table: "table_name"
    - db: "imd_aml_dm_safe"
      table: "table_name"
    - db: "imd_amlai_ads_safe"
      table: "table_name"
    - db: "imd_aml300_ads_safe"
      table: "table_name"
    - db: "imd_rdfs_dm_safe"
      table: "table_name"
    - db: "imd_dm_safe"
      table: "table_name"
    - path: "/user/hive/warehouse/custom/path"
